name: Deploy Application

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: Test_vautra

    steps:
      - name: Verify Runner
        run: |
          echo "Hostname: $(hostname)"
          echo "Current User: $(whoami)"
          echo "Working Directory: $(pwd)"

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Pull Latest Image
        run: |
          docker pull ghcr.io/p70750/test_vautra:latest

      - name: Stop Existing Container
        run: |
          docker stop test_vautra || true

      - name: Remove Existing Container
        run: |
          docker rm test_vautra || true

      - name: Remove Old Image (Optional)
        run: |
          docker image prune -f

      - name: Run Container
        run: |
          docker run -d \
            --name test_vautra \
            -p 8090:80 \
            --restart always \
            ghcr.io/p70750/test_vautra:latest

      - name: Verify Deployment
        run: |
          echo "========== Docker Images =========="
          docker images

          echo "========== Docker Containers =========="
          docker ps -a

          echo "========== Running Containers =========="
          docker ps
